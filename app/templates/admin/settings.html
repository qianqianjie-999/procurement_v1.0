{% extends "base.html" %}

{% block title %}系统设置 - 采购管理系统{% endblock %}
{% block page_title %}系统设置{% endblock %}

{% block content %}
<div class="fade-in">
    <!-- 页面标题 -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-gear"></i> 系统设置</h2>
        <button class="btn btn-primary">
            <i class="bi bi-save"></i> 保存设置
        </button>
    </div>
    
    <!-- 系统信息卡片 -->
    <div class="form-section">
        <h3 class="mb-4"><i class="bi bi-info-circle"></i> 系统信息</h3>
        <div class="row g-3">
            <div class="col-md-6">
                <div class="detail-section">
                    <span class="detail-label">系统版本</span>
                    <span class="detail-value">v1.0.0</span>
                </div>
            </div>
            <div class="col-md-6">
                <div class="detail-section">
                    <span class="detail-label">Python版本</span>
                    <span class="detail-value">3.12.0</span>
                </div>
            </div>
            <div class="col-md-6">
                <div class="detail-section">
                    <span class="detail-label">数据库</span>
                    <span class="detail-value">MySQL/MariaDB</span>
                </div>
            </div>
            <div class="col-md-6">
                <div class="detail-section">
                    <span class="detail-label">部署环境</span>
                    <span class="detail-value">Development</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 基本设置 -->
    <div class="form-section">
        <h3 class="mb-4"><i class="bi bi-sliders"></i> 基本设置</h3>
        <form>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">系统名称</label>
                    <input type="text" class="form-control" value="采购管理系统">
                </div>
                <div class="col-md-6">
                    <label class="form-label">公司名称</label>
                    <input type="text" class="form-control" value="示例公司">
                </div>
                <div class="col-md-6">
                    <label class="form-label">时区</label>
                    <select class="form-select">
                        <option>Asia/Shanghai</option>
                        <option>UTC</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">默认语言</label>
                    <select class="form-select">
                        <option>中文 (简体)</option>
                        <option>English</option>
                    </select>
                </div>
            </div>
        </form>
    </div>
    
    <!-- 邮件设置 -->
    <div class="form-section">
        <h3 class="mb-4"><i class="bi bi-envelope"></i> 邮件设置</h3>
        <form>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">SMTP服务器</label>
                    <input type="text" class="form-control" placeholder="smtp.example.com">
                </div>
                <div class="col-md-6">
                    <label class="form-label">SMTP端口</label>
                    <input type="number" class="form-control" placeholder="587">
                </div>
                <div class="col-md-6">
                    <label class="form-label">发件人邮箱</label>
                    <input type="email" class="form-control" placeholder="noreply@example.com">
                </div>
                <div class="col-md-6">
                    <label class="form-label">SMTP密码</label>
                    <input type="password" class="form-control" placeholder="••••••••">
                </div>
            </div>
        </form>
    </div>
    
    <!-- PDF设置 -->
    <div class="form-section">
        <h3 class="mb-4"><i class="bi bi-file-earmark-pdf"></i> PDF设置</h3>
        <form>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">中文字体路径</label>
                    <input type="text" class="form-control" value="/var/www/html/procurement/app/static/fonts/SimSun.ttf">
                </div>
                <div class="col-md-6">
                    <label class="form-label">PDF存储路径</label>
                    <input type="text" class="form-control" value="/var/www/html/procurement/app/static/pdfs">
                </div>
                <div class="col-12">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="preloadFonts" checked>
                        <label class="form-check-label" for="preloadFonts">
                            预加载字体到内存（提高PDF生成速度）
                        </label>
                    </div>
                </div>
            </div>
        </form>
    </div>
    
    <!-- 操作按钮 -->
    <div class="d-flex gap-2 justify-content-end">
        <button class="btn btn-secondary">
            <i class="bi bi-arrow-counterclockwise"></i> 重置
        </button>
        <button class="btn btn-primary">
            <i class="bi bi-save"></i> 保存设置
        </button>
    </div>
</div>
{% endblock %}
