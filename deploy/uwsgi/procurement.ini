# ============================================================================
# uWSGI 配置文件 - 采购管理系统
# 文件位置：/etc/uwsgi.d/procurement.ini
# ============================================================================

[uwsgi]
# 项目配置
chdir = /opt/procurement
module = deploy.wsgi:application

# Python 虚拟环境
venv = /opt/procurement/venv
pythonpath = /opt/procurement

# 主进程
master = true
processes = 4
threads = 2

# Socket 配置 (与 Nginx 配合使用)
socket = /var/run/uwsgi/procurement.sock
chmod-socket = 664
chown-socket = apache:apache

# 或使用 TCP (与 Apache 配合使用)
# http-socket = 127.0.0.1:8000

# 进程和用户
uid = apache
gid = apache

# 日志配置
logto = /var/log/uwsgi/procurement.log
log-maxsize = 10485760
log-backupname = /var/log/uwsgi/procurement.log.old

# 性能优化
harakiri = 30
harakiri-verbose = true
max-requests = 1000
max-requests-delta = 100

# 内存优化
lazy-apps = true
vacuum = true
single-interpreter = true

# 优雅重启
die-on-term = true
need-app = true

# 环境变量
env = FLASK_ENV=production

# 守护进程
daemonize = /var/log/uwsgi/procurement_daemon.log

# PID 文件
pidfile = /var/run/uwsgi/procurement.pid
