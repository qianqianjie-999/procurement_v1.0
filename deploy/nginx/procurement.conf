# ============================================================================
# Nginx 配置文件 - 采购管理系统
# 文件位置：/etc/nginx/conf.d/procurement.conf
# ============================================================================

upstream procurement_app {
    server unix:/var/run/uwsgi/procurement.sock fail_timeout=0;
    # 或使用 TCP: server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name localhost;
    # server_name your-domain.com www.your-domain.com;

    # 日志配置
    access_log /var/log/nginx/procurement_access.log;
    error_log /var/log/nginx/procurement_error.log;

    # 静态文件配置
    location /static {
        alias /opt/procurement/app/static;
        expires 30d;
        add_header Cache-Control "public, immutable";

        # 类型配置
        types {
            text/css css;
            application/javascript js;
            image/svg+xml svg;
            font/woff woff;
            font/woff2 woff2;
        }
    }

    # uWSGI 代理配置
    location / {
        include uwsgi_params;
        uwsgi_pass procurement_app;

        # 代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置
        uwsgi_read_timeout 300;
        uwsgi_send_timeout 300;

        # 文件大小限制
        client_max_body_size 10M;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

