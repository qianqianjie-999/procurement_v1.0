# ============================================================================
# Apache HTTPD 配置文件 - 采购管理系统
# 文件位置：/etc/httpd/conf.d/procurement.conf
# Python 版本：3.9
# 项目目录：/var/www/html/procurement
# 端口：9002
# ============================================================================

# WSGI Python 路径
WSGIPythonPath /var/www/html/procurement:/var/www/html/procurement/venv/lib/python3.9/site-packages

# ============================================================================
# VirtualHost 配置
# ============================================================================
<VirtualHost *:9002>
    ServerName localhost
    # ServerName your-domain.com

    ServerAdmin admin@example.com

    # 文档根目录
    DocumentRoot /var/www/html/procurement/app/static

    # 静态文件配置
    Alias /static /var/www/html/procurement/app/static
    <Directory /var/www/html/procurement/app/static>
        Require all granted
        ExpiresActive On
        ExpiresByType image/jpg "access plus 1 year"
        ExpiresByType image/jpeg "access plus 1 year"
        ExpiresByType image/png "access plus 1 year"
        ExpiresByType text/css "access plus 1 month"
        ExpiresByType application/javascript "access plus 1 month"
    </Directory>

    # WSGI 应用配置
    WSGIDaemonProcess procurement \
        python-path=/var/www/html/procurement \
        processes=2 \
        threads=15 \
        maximum-requests=500 \
        display-name=%{GROUP}

    WSGIProcessGroup procurement
    WSGIScriptAlias / /var/www/html/procurement/deploy/wsgi.py

    <Directory /var/www/html/procurement/deploy>
        Require all granted
    </Directory>

    # 错误日志
    ErrorLog /var/log/httpd/procurement_error.log
    LogLevel warn
    CustomLog /var/log/httpd/procurement_access.log combined

    # 安全头
    <IfModule mod_headers.c>
        Header set X-Content-Type-Options "nosniff"
        Header set X-Frame-Options "SAMEORIGIN"
        Header set X-XSS-Protection "1; mode=block"
    </IfModule>
</VirtualHost>
